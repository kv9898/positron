name: Build Positron Multi-Platform

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: win32-x64
            runner: windows-latest
            artifact_name: px64

          - platform: darwin-arm64
            runner: macos-latest
            artifact_name: VSCode-darwin-arm64

          - platform: reh-linux-x64
            runner: ubuntu-latest
            artifact_name: vscode-reh-linux-x64

    steps:
      - name: 🧾 Checkout source
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🛠 Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libkrb5-dev \
            python3 \
            make \
            g++ \
            build-essential \
            libx11-dev \
            libxkbfile-dev

      - name: 🛡 Set GITHUB_TOKEN for GitHub API access
        run: echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: 📦 Install Node.js dependencies
        run: |
          npm ci
          npm --prefix test/e2e ci

      - name: 📦 Package VS Code for ${{ matrix.platform }}
        run: npm run gulp vscode-${{ matrix.platform }}

      - name: 📦 Compress packaged VS Code
        run: |
          cd ..
          if [[ "${{ matrix.platform }}" == "win32-x64" || "${{ matrix.platform }}" == "darwin-arm64" ]]; then
            zip -r ${{ matrix.artifact_name }}.zip ${{ matrix.artifact_name }}
          elif [[ "${{ matrix.platform }}" == "reh-linux-x64" ]]; then
            tar -czf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}
          fi
        shell: bash

      - name: 📤 Upload compressed output
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-archive
          path: |
            ../${{ matrix.artifact_name }}.zip
            ../${{ matrix.artifact_name }}.tar.gz
